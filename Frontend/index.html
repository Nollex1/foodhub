<!-- ========================================
     ADD THESE META TAGS TO index.html <head>
     ======================================== -->

<!-- REPLACE your existing <head> section with this: -->

<head>
    <meta charset="UTF-8">
    
    <!-- MOBILE VIEWPORT - CRITICAL FOR MOBILE RESPONSIVENESS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    
    <!-- Mobile Web App Capable -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Theme Color for Mobile Browsers -->
    <meta name="theme-color" content="#ff6b35">
    <meta name="msapplication-navbutton-color" content="#ff6b35">
    <meta name="apple-mobile-web-app-status-bar-style" content="#ff6b35">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Order delicious food from your favorite local restaurants. Fast delivery, easy ordering, multiple payment options.">
    <meta name="keywords" content="food delivery, restaurant, order food online, Nigerian food, fast food">
    <meta name="author" content="FoodHub">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="FoodHub - Order Food Online">
    <meta property="og:description" content="Order delicious food from your favorite local restaurants">
    <meta property="og:image" content="/path-to-your-logo.png">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="FoodHub - Order Food Online">
    <meta name="twitter:description" content="Order delicious food from your favorite local restaurants">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    
    <title>FoodHub - Order Food from Local Restaurants</title>
    
    <!-- Your existing CSS -->
    <link rel="stylesheet" href="style.css">
</head>
