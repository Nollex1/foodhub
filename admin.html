<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff6b35">
    <title>FoodHub Admin - User Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d1810 100%);
            color: white;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 2rem;
            background: rgba(255, 107, 53, 0.1);
            border-radius: 15px;
            border: 2px solid #ff6b35;
        }

        .header h1 {
            color: #ff6b35;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #ffa500;
            font-size: 1.2rem;
        }

        .back-home {
            display: inline-block;
            margin-bottom: 1rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 107, 53, 0.2);
            border: 2px solid #ff6b35;
            color: #ffa500;
            text-decoration: none;
            border-radius: 25px;
            transition: all 0.3s;
        }

        .back-home:hover {
            background: #ff6b35;
            color: white;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ff6b35;
            border-radius: 10px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffa500;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: #ccc;
            font-size: 1rem;
        }

        .users-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 2rem;
            border: 2px solid #ff6b35;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .section-header h2 {
            color: #ffa500;
            font-size: 1.8rem;
        }

        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: 2px solid #ff6b35;
            color: #ff6b35;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #ff6b35;
            color: white;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            overflow-x: auto;
        }

        .users-table th,
        .users-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .users-table th {
            background: rgba(255, 107, 53, 0.2);
            color: #ffa500;
            font-weight: bold;
        }

        .users-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .user-email {
            color: #4CAF50;
            font-weight: bold;
        }

        .user-phone {
            color: #2196F3;
        }

        .user-date {
            color: #ccc;
            font-size: 0.9rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #ffa500;
            font-size: 1.2rem;
        }

        .error {
            background: rgba(244, 67, 54, 0.1);
            border: 2px solid #f44336;
            color: #f44336;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        .export-btn {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            border: none;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 1rem;
            font-size: 1rem;
            transition: transform 0.3s;
        }

        .export-btn:hover {
            transform: scale(1.05);
        }

        .table-wrapper {
            overflow-x: auto;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .users-table {
                font-size: 0.85rem;
            }

            .users-table th,
            .users-table td {
                padding: 0.5rem;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-home">← Back to Home</a>

        <div class="header">
            <h1>🍽️ FoodHub Admin</h1>
            <p>User Management Dashboard</p>
        </div>

        <div id="statsContainer" class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalUsers">--</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="recentUsers">--</div>
                <div class="stat-label">Last 30 Days</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="todayUsers">--</div>
                <div class="stat-label">New Today</div>
            </div>
        </div>

        <div class="users-section">
            <div class="section-header">
                <h2>Registered Users</h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="loadUsers('all')">All Users</button>
                    <button class="filter-btn" onclick="loadUsers('recent')">Recent (30 days)</button>
                </div>
            </div>

            <button class="export-btn" onclick="exportToCSV()">📊 Export to CSV</button>

            <div id="usersContainer">
                <div class="loading">Loading users...</div>
            </div>
        </div>
    </div>

    <script>
        // Detect environment and set API URL
        const isProduction = window.location.hostname !== 'localhost';
        const API_BASE_URL = isProduction 
            ? window.location.origin + '/api'
            : 'http://localhost:5001/api';

        console.log('Environment:', isProduction ? 'PRODUCTION' : 'DEVELOPMENT');
        console.log('API URL:', API_BASE_URL);

        // Load data when page loads
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadUsers('all');
        });

        async function loadStats() {
            try {
                console.log('Loading stats from:', `${API_BASE_URL}/admin/stats`);
                const response = await fetch(`${API_BASE_URL}/admin/stats`);
                const data = await response.json();

                console.log('Stats response:', data);

                if (data.success) {
                    document.getElementById('totalUsers').textContent = data.stats.total_users || 0;
                    document.getElementById('recentUsers').textContent = data.stats.recent_users_30_days || 0;
                    document.getElementById('todayUsers').textContent = data.stats.new_users_today || 0;
                } else {
                    console.error('Stats load failed:', data);
                }
            } catch (error) {
                console.error('Error loading stats:', error);
                document.getElementById('totalUsers').textContent = '0';
                document.getElementById('recentUsers').textContent = '0';
                document.getElementById('todayUsers').textContent = '0';
            }
        }

        async function loadUsers(filter = 'all') {
            const container = document.getElementById('usersContainer');
            container.innerHTML = '<div class="loading">Loading users...</div>';

            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event?.target?.classList?.add('active');

            try {
                const endpoint = filter === 'recent' ? '/admin/users/recent' : '/admin/users';
                console.log('Loading users from:', `${API_BASE_URL}${endpoint}`);
                
                const response = await fetch(`${API_BASE_URL}${endpoint}`);
                const data = await response.json();

                console.log('Users response:', data);

                if (data.success) {
                    displayUsers(data.users);
                } else {
                    container.innerHTML = `<div class="error">Failed to load users: ${data.error}</div>`;
                }
            } catch (error) {
                console.error('Error loading users:', error);
                container.innerHTML = `<div class="error">Error loading users: ${error.message}</div>`;
            }
        }

        function displayUsers(users) {
            if (!users || users.length === 0) {
                document.getElementById('usersContainer').innerHTML = '<div class="loading">No users found</div>';
                return;
            }

            const tableHTML = `
                <div class="table-wrapper">
                    <table class="users-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Registered</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${users.map(user => `
                                <tr>
                                    <td>${user.id}</td>
                                    <td>${user.name}</td>
                                    <td class="user-email">${user.email}</td>
                                    <td class="user-phone">${user.phone || 'N/A'}</td>
                                    <td class="user-date">${new Date(user.created_at).toLocaleDateString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            document.getElementById('usersContainer').innerHTML = tableHTML;
        }

        function exportToCSV() {
            const table = document.querySelector('.users-table');
            if (!table) {
                alert('No data to export');
                return;
            }

            let csv = 'ID,Name,Email,Phone,Registered Date\n';

            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                const rowData = Array.from(cells).map(cell => `"${cell.textContent.trim()}"`).join(',');
                csv += rowData + '\n';
            });

            // Download CSV file
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `foodhub_users_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        // Auto-refresh stats every 30 seconds
        setInterval(() => {
            loadStats();
        }, 30000);
    </script>
</body>
</html>
